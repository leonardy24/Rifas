<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <title>Document</title>
     <!-- Bootstrap CSS -->
     <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
     <!-- Para las donas -->
     <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<style>
    article{
        margin-top: 50px; 
        padding: 20px;
        
    }

    
    .main-content {
    margin-top: 100px;
    margin-right: 5px;
    margin-left: 5px;
    padding: 10px;
    border: 1px solid black;
    border-radius: 1%;
    
}

/* Para pantallas medianas en adelante */
@media (min-width: 768px) {
    .main-content {
        margin-left: 200px;
        margin-right: 200px;
    }
}


#rifas-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
    gap: 8px;
}
.btn-mini {
    padding: 2px 4px !important;
    font-size: 0.65rem !important;
}



</style>
<body>

    <nav class="navbar bg-body-tertiary fixed-top">
        <div class="container-fluid">
            <button class="btn btn-dark" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="" aria-label="Toggle navigation">
                ☰
            </button>

            <div class="offcanvas  offcanvas-start  bg-dark" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
                <div class="offcanvas-header bg-dark">
                    <button  class="btn btn-dark" type="button"  data-bs-dismiss="offcanvas">☰</button>
                    <h5 class="offcanvas-title text-white" id="offcanvasNavbarLabel">Rifas</h5>
                </div>

                <div class="offcanvas-body bg-secondary-bs">
                    <ul class="nav nav-pills flex-column">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="index.html">Rifas</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Agregar rifas</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

    </nav>

    <div class="main-content">
        <h2 class="text-center mb-4">Listado de Rifas</h2>

        <div id="rifas-container" class="row g-1"></div>

        <nav> 
        <ul id="pagination" class="pagination justify-content-center mt-3">
        </ul>
        
        <div id="seleccionados-info" class="bg-ligth text-center m-5">
            Seleccionados: <span id="cantidad-seleccionados">0</span> número(s)
        </div>
    </nav>

    
    <div class="row">
        <div class="mb-3 col-12 col-md-6">
            <label class="form-label">Nombres y Apellidos *</label>
            <input type="text" class="form-control" >
        </div>

        <div class="mb-3 col-12 col-md-4">
            <label class="form-label">Cédula *</label>
            <input type="text" class="form-control">
        </div>
    </div>

    <div class="row">
        <div class="mb-3 col-12 col-md-6">
            <label class="form-label">Estado *</label>
            <input type="text" class="form-control" >
        </div>

        <div class="mb-3 col-12 col-md-4">
            <label class="form-label">Teléfono *</label>
            <input type="number" class="form-control">
        </div>
    </div>

    <div class="row">
        <div class="mb-3 col-12 col-md-6">
            <label class="form-label">Tipo de pago</label>
            <input type="text" class="form-control" >
        </div>

    </div>

    <div class="mt-4 text-center" style="max-width:400px; margin:auto;">
        <canvas id="grafico-ventas" width="0" height="0"></canvas>
    </div>

    </div>


    <script>
const totalNumeros = 1000;   // ← aquí cambias la cantidad
const porPagina = 100;
let paginaActual = 1;

const container = document.getElementById("rifas-container");
const paginacion = document.getElementById("pagination");

let seleccionados = new Set();


function actualizarSeleccionados() {
    const span = document.getElementById("cantidad-seleccionados");
    span.textContent = seleccionados.size;
}

function mostrarPagina(pagina) {
    container.innerHTML = "";
    paginaActual = pagina;

    const inicio = (pagina - 1) * porPagina + 1;
    const fin = Math.min(inicio + porPagina - 1, totalNumeros);

    // ← AQUÍ SE GENERAN LOS NÚMEROS
    for (let i = inicio; i <= fin; i++) {
        const col = document.createElement("div");
        //col.className = "col-3 col-md-1";

        const button = document.createElement("button");
        button.className = "btn btn-light btn-mini  w-100";
        button.textContent = i;

        if (seleccionados.has(i)) {
            button.classList.remove("btn-light");
            button.classList.add("btn-success");
        }

        button.onclick = () => {

            if (seleccionados.has(i)) {
                seleccionados.delete(i);
                button.classList.remove("btn-success");
                button.classList.add("btn-light");
            } else {
                seleccionados.add(i);
                button.classList.remove("btn-light");
                button.classList.add("btn-success");
            }

            actualizarSeleccionados();
    };
        col.appendChild(button);
        container.appendChild(col);
    }

    generarPaginacion();
}

function generarPaginacion() {
    paginacion.innerHTML = "";
    const totalPaginas = Math.ceil(totalNumeros / porPagina);

    crearBoton("«", paginaActual > 1, () => mostrarPagina(paginaActual - 1));

    let inicio = Math.max(1, paginaActual - 2);
    let fin = Math.min(totalPaginas, paginaActual + 2);

    if (paginaActual <= 3) {
        fin = Math.min(5, totalPaginas);
    } else if (paginaActual >= totalPaginas - 2) {
        inicio = Math.max(1, totalPaginas - 4);
    }

    if (inicio > 1) {
        crearBoton("1", true, () => mostrarPagina(1));
        crearBoton("...", false);
    }

    for (let i = inicio; i <= fin; i++) {
        crearBoton(i, true, () => mostrarPagina(i), i === paginaActual);
    }

    if (fin < totalPaginas) {
        crearBoton("...", false);
        crearBoton(totalPaginas, true, () => mostrarPagina(totalPaginas));
    }

    crearBoton("»", paginaActual < totalPaginas, () => mostrarPagina(paginaActual + 1));
}

function crearBoton(texto, habilitado, accion = null, activo = false) {
    const li = document.createElement("li");
    li.className = "page-item " + (activo ? "active" : "") + (!habilitado ? " disabled" : "");

    const a = document.createElement("a");
    a.className = "page-link";
    a.textContent = texto;

    if (habilitado && accion) a.onclick = accion;

    li.appendChild(a);
    paginacion.appendChild(li);
}

// Generar porcentaje de ventas aleatorio
const porcentajeVentas = Math.floor(Math.random() * 101); // 0 a 100%

const ctx = document.getElementById("grafico-ventas").getContext("2d");

const grafico = new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: ['Vendidos', 'Disponibles'],
        datasets: [{
            data: [porcentajeVentas, 100 - porcentajeVentas],
            backgroundColor: ['#198754', '#e9ecef'], // verde y gris
            borderWidth: 1
        }]
    },
    options: {
        responsive:true,
        maintainAspectRatio: true,
        plugins: {
            legend: {
                position: 'bottom'
            },
            tooltip: {
                callbacks: {
                    label: function(context) {
                        return context.label + ': ' + context.parsed + '%';
                    }
                }
            }
        },
        cutout: '70%' // grosor del anillo de la dona
    }
});

mostrarPagina(1);
</script>


    
    
</body>
</html>
